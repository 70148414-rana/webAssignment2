<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Contact - Student Management System</title>
<link rel="stylesheet" href="assets/style.css">
<link rel="icon" type="image/png" href="assets/fulllogo.png">
<style>
  /* --- GENERAL BODY & THEME --- */
  body {
    font-family: 'Arial', sans-serif;
    margin: 0;
    padding: 0;
    background: linear-gradient(135deg, #667eea, #764ba2);
    color: #fff;
    min-height: 100vh;
    transition: all 0.5s ease;
  }

  body.light-mode {
    background: #f5f5f5;
    color: #333;
  }

  /* --- NAVIGATION BAR --- */
  nav {
    display: flex;
    justify-content: space-between;
    align-items: center;
    background: rgba(0,0,0,0.7);
    padding: 10px 20px;
    box-shadow: 0 5px 15px rgba(0,0,0,0.3);
    flex-wrap: wrap;
    transition: all 0.3s ease;
  }
  nav .nav-left {
    display: flex;
    align-items: center;
    gap: 10px;
  }
  nav .logo { width: 50px; height: 50px; border-radius: 10px; }
  nav a {
    color: white;
    text-decoration: none;
    margin-left: 10px;
    padding: 5px 10px;
    border-radius: 8px;
    transition: all 0.3s ease;
  }
  nav a.btn { background: linear-gradient(45deg, #ff758c, #ff7eb3); }
  nav a:hover { transform: scale(1.05); box-shadow: 0 5px 15px rgba(0,0,0,0.4); }
  .theme-btn {
    font-size: 1.2rem;
    background: none;
    border: none;
    cursor: pointer;
    color: white;
    margin-left: 10px;
    transition: all 0.3s ease;
  }

  /* --- HERO / HEADER --- */
  .hero {
    text-align: center;
    padding: 40px 20px;
  }
  .hero h1 { font-size: 3rem; text-shadow: 2px 2px 10px rgba(0,0,0,0.3); }
  .hero p { font-size: 1.2rem; margin-top: 10px; color: #f0f0f0; }

  /* --- CONTACT FORM --- */
  .contact-form {
    background: rgba(255,255,255,0.15);
    backdrop-filter: blur(10px);
    padding: 25px 30px;
    border-radius: 15px;
    max-width: 500px;
    width: 100%;
    margin: 20px auto;
    box-shadow: 0 10px 25px rgba(0,0,0,0.3);
    transition: all 0.3s ease;
  }
  .contact-form input, .contact-form textarea {
    width: 100%;
    padding: 12px;
    margin-bottom: 15px;
    border-radius: 10px;
    border: none;
    outline: none;
    font-size: 1rem;
  }
  .contact-form button {
    width: 100%;
    padding: 12px;
    border: none;
    border-radius: 12px;
    background: linear-gradient(45deg, #ff758c, #ff7eb3);
    color: white;
    font-weight: bold;
    cursor: pointer;
    font-size: 1rem;
    transition: all 0.3s ease;
  }
  .contact-form button:hover {
    transform: scale(1.05);
    box-shadow: 0 8px 25px rgba(0,0,0,0.5);
  }

  /* --- CONTACT INFO --- */
  .contact-info {
    text-align: center;
    font-size: 1.2rem;
    margin-bottom: 30px;
    color: #f0f0f0;
    text-shadow: 1px 1px 6px rgba(0,0,0,0.2);
  }

  /* --- BACK BUTTON --- */
  .back-btn {
    display: inline-block;
    text-decoration: none;
    padding: 12px 25px;
    border-radius: 12px;
    background: linear-gradient(45deg, #764ba2, #667eea);
    color: white;
    font-weight: bold;
    transition: all 0.3s ease;
    margin-bottom: 20px;
  }
  .back-btn:hover {
    transform: scale(1.05);
    box-shadow: 0 8px 25px rgba(0,0,0,0.5);
  }

  /* --- LIGHT MODE ADJUSTMENTS --- */
  body.light-mode nav { background: rgb(180,85,85); box-shadow: 0 5px 15px rgba(0,0,0,0.2); }
  body.light-mode nav a { color: #fff; }
  body.light-mode .contact-form { background: #fff; color: #333; box-shadow: 0 10px 25px rgba(0,0,0,0.1); }

  /* --- RESPONSIVE --- */
  @media (max-width:600px){
    nav { flex-direction: column; align-items: flex-start; }
    .contact-form { padding: 20px; }
    h1 { font-size: 2.2rem; }
  }
</style>
</head>
<body class="light-mode">

<!-- NAVIGATION BAR -->
<nav>
  <div class="nav-left">
    <img src="fulllogo.png" alt="Logo" class="logo">
    <span class="brand">Student Management System</span>
  </div>
  <div class="nav-right">
    <a href="index.html">Home</a>
    <a href="about.html">About</a>
    <a href="contact.html" class="btn">Contact</a>
    <a href="signin.html" class="btn">Sign In</a>
    <a href="signup.html" class="btn">Sign Up</a>
    <button id="themeToggle" class="theme-btn">🌙</button>
  </div>
</nav>

<!-- HERO SECTION -->
<header class="hero">
  <h1>Contact Us</h1>
  <p>Have a complaint, suggestion, or question? Reach out to us!</p>
</header>

<!-- CONTACT INFO -->
<div class="contact-info">
  <p><strong>Email:</strong> 70148414@student.uol.edu.pk</p>
  <p><strong>Phone:</strong> 03013922022</p>
</div>

<!-- CONTACT FORM -->
<form class="contact-form" action="https://formspree.io/f/mlgojjyq" method="POST">
  <input type="text" name="name" placeholder="Your Name" required>
  <input type="email" name="email" placeholder="Your Email" required>
  <input type="text" name="subject" placeholder="Subject" required>
  <textarea name="message" rows="6" placeholder="Write your complaint or suggestion..." required></textarea>
  <button type="submit">Submit</button>
</form>

<a href="index.html" class="back-btn">← Back to Home</a>

<script>
// --- THEME TOGGLE ---
const themeBtn = document.getElementById("themeToggle");
const body = document.body;
themeBtn.addEventListener("click", () => {
  if(body.classList.contains("light-mode")){
    body.classList.replace("light-mode", "dark-mode");
    themeBtn.textContent = "☀️";
  } else {
    body.classList.replace("dark-mode", "light-mode");
    themeBtn.textContent = "🌙";
  }
});
</script>

</body>
</html>
