<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sign In - Student Management System</title>

<style>
body{
font-family: Arial, sans-serif;
margin:0;
background: linear-gradient(135deg,#ea6690,#4b9ca2);
color:white;
}

nav{
display:flex;
justify-content:space-between;
align-items:center;
padding:10px 20px;
background:rgba(0,0,0,0.7);
}

nav a{
color:white;
text-decoration:none;
margin-left:10px;
padding:6px 10px;
border-radius:8px;
}

nav a.btn{
background:#ff758c;
}

.container{
display:flex;
flex-direction:column;
align-items:center;
padding:40px;
}

.signin-form{
display:flex;
flex-direction:column;
gap:15px;
background:rgba(255,255,255,0.2);
padding:30px;
border-radius:15px;
width:300px;
}

.signin-form input{
padding:10px;
border-radius:8px;
border:none;
}

.signin-form button{
padding:10px;
border:none;
border-radius:8px;
background:#ff758c;
color:white;
font-weight:bold;
cursor:pointer;
}

.message{
margin-top:15px;
font-weight:bold;
}
</style>

</head>
<body>

<nav>
<div>Student Management System</div>

<div>
<a href="index.html">Home</a>
<a href="about.html">About</a>
<a href="contact.html">Contact</a>
<a href="signin.html" class="btn">Sign In</a>
<a href="signup.html" class="btn">Sign Up</a>
</div>
</nav>

<div class="container">

<h1>Sign In</h1>

<form class="signin-form" id="loginForm">

<input type="email" id="email" placeholder="Email" required>

<input type="password" id="password" placeholder="Password" required>

<button type="submit">Sign In</button>

</form>

<div class="message" id="message"></div>

</div>

<script>

document.getElementById("loginForm").addEventListener("submit", function(e){

e.preventDefault();

let email = document.getElementById("email").value;
let password = document.getElementById("password").value;

let message = document.getElementById("message");

/* Demo login credentials */
let validEmail = "admin@gmail.com";
let validPassword = "123456";

if(email === validEmail && password === validPassword){

message.style.color = "lightgreen";
message.textContent = "Login successful! Redirecting...";

setTimeout(()=>{
window.location.href = "index.html";
},1500);

}
else{

message.style.color = "yellow";
message.textContent = "Invalid email or password";

}

});

</script>

</body>
</html>
