<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sign Up - Student Management System</title>
<link rel="stylesheet" href="style.css">
<style>
  /* --- GENERAL BODY --- */
  body {
    font-family: 'Arial', sans-serif;
    margin: 0;
    padding: 0;
    background: linear-gradient(135deg, #75ffd3, #c3ff7e);
    color: #fff;
    min-height: 100vh;
    transition: all 0.5s ease;
  }
  body.light-mode { background: #f5f5f5; color: #333; }

  /* --- NAVIGATION BAR --- */
  nav {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 10px 20px;
    background: rgba(0,0,0,0.7);
    box-shadow: 0 5px 15px rgba(0,0,0,0.3);
    flex-wrap: wrap;
    position: sticky;
    top: 0;
    z-index: 100;
  }
  nav .nav-left { display: flex; align-items: center; gap: 10px; }
  nav .logo { width: 50px; height: 50px; border-radius: 10px; }
  nav a { color: white; text-decoration: none; margin-left: 10px; padding: 5px 10px; border-radius: 8px; transition: all 0.3s ease; }
  nav a.btn { background: linear-gradient(45deg, #ff758c, #ff7eb3); }
  nav a:hover { transform: scale(1.05); box-shadow: 0 5px 15px rgba(0,0,0,0.4); }
  .theme-btn { font-size: 1.2rem; background: none; border: none; cursor: pointer; color: white; margin-left: 10px; transition: all 0.3s ease; }

  /* --- MAIN CONTAINER --- */
  .container {
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 40px 20px;
    text-align: center;
  }

  h1 {
    font-size: 3rem;
    margin-bottom: 30px;
    text-shadow: 2px 2px 8px rgba(0,0,0,0.3);
  }

  /* --- SIGN UP FORM --- */
  .signup-form {
    display: flex;
    flex-direction: column;
    gap: 15px;
    background: rgba(255,255,255,0.15);
    backdrop-filter: blur(10px);
    padding: 30px;
    border-radius: 20px;
    width: 100%;
    max-width: 400px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.2);
    transition: all 0.3s ease;
  }

  .signup-form input {
    padding: 12px;
    border-radius: 12px;
    border: 1px solid rgba(255,255,255,0.3);
    background: rgba(255,255,255,0.2);
    color: #fff;
    font-size: 1rem;
    transition: all 0.3s ease;
  }
  .signup-form input::placeholder { color: rgba(255,255,255,0.7); }
  .signup-form input:focus { outline: none; border: 2px solid #667eea; background: rgba(255,255,255,0.3); }

  .signup-form button {
    padding: 12px;
    border-radius: 12px;
    border: none;
    font-weight: bold;
    cursor: pointer;
    background: linear-gradient(45deg, #667eea, #764ba2);
    color: white;
    box-shadow: 0 5px 15px rgba(0,0,0,0.3);
    transition: all 0.3s ease;
  }
  .signup-form button:hover { transform: scale(1.05); background: linear-gradient(45deg, #75ffe8, #ff7eb3); box-shadow: 0 8px 25px rgba(0,0,0,0.5); }

  /* --- BACK BUTTON --- */
  .back-btn {
    display: inline-block;
    margin-top: 20px;
    text-decoration: none;
    padding: 10px 20px;
    border-radius: 12px;
    background: linear-gradient(45deg, #764ba2, #667eea);
    color: #fff;
    font-weight: bold;
    transition: all 0.3s ease;
    box-shadow: 0 5px 15px rgba(0,0,0,0.3);
  }
  .back-btn:hover { transform: scale(1.05); box-shadow: 0 8px 25px rgba(0,0,0,0.5); background: linear-gradient(45deg, #ffd175, #c5ff7e); }

  /* --- RESPONSIVE --- */
  @media (max-width: 500px) {
    h1 { font-size: 2.2rem; }
    .signup-form { padding: 20px; }
    .signup-form input, .signup-form button { font-size: 0.95rem; }
    nav { flex-direction: column; align-items: flex-start; }
  }
</style>
</head>
<body class="light-mode">

<!-- NAVIGATION BAR -->
<nav>
  <div class="nav-left">
    <img src="fulllogo.jpg" alt="Student Management System Logo" class="logo">
    <span class="brand">Student Management System</span>
  </div>
  <div class="nav-right">
    <a href="index.html">Home</a>
    <a href="about.html">About</a>
    <a href="contact.html">Contact</a>
    <a href="signin.html" class="btn">Sign In</a>
    <a href="signup.html" class="btn">Sign Up</a>
    <button id="themeToggle" class="theme-btn">🌙</button>
  </div>
</nav>

<!-- MAIN CONTENT -->
<div class="container">
  <h1>Sign Up</h1>

  <form class="signup-form">
    <input type="text" placeholder="Name" required>
    <input type="email" placeholder="Email" required>
    <input type="password" placeholder="Password" required>
    <button type="submit">Sign Up</button>
  </form>

  <a href="index.html" class="back-btn">← Back to Home</a>
</div>

<script>
  // Theme Toggle
  const themeBtn = document.getElementById("themeToggle");
  themeBtn.addEventListener("click", () => {
    document.body.classList.toggle("light-mode");
    themeBtn.textContent = document.body.classList.contains("light-mode") ? "🌙" : "☀️";
  });
</script>

</body>
</html>
